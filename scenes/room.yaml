name: room

camera:
  position: [0, 1.0, -0.5]
  look_at: [0, 0.8, 3.0]
  up: [0, 1, 0]
  vfov: 70

sky:
  type: none

lights:
  - position: [2.5, 2.0, 3.0]
    emission: { blackbody: { temp: 5778, luminance: 25 } }
  - position: [0, 2.3, 3.0]
    emission: { blackbody: { temp: 3500, luminance: 12 } }
  - position: [2.3, 1.9, 4.9]
    emission: { blackbody: { temp: 3500, luminance: 5 } }

objects:
  # Floor
  - shape: { plane: {} }
    material:
      checker:
        even: { rgb: [0.55, 0.35, 0.18] }
        odd: { rgb: [0.65, 0.45, 0.25] }
        scale: 0.4

  # Ceiling (flip normal downward)
  - shape:
      plane: {}
      position: [0, 2.5, 0]
      rotation: [0, 0, 180]
    material:
      diffuse: { rgb: [0.9, 0.9, 0.9] }

  # Back wall (normal -Z)
  - shape:
      plane: {}
      position: [0, 0, 6]
      rotation: [0, -90, 0]
    material:
      diffuse: { rgb: [0.6, 0.15, 0.1] }

  # Left wall (normal +X)
  - shape:
      plane: {}
      position: [-3, 0, 0]
      rotation: [0, 0, 90]
    material:
      diffuse: { rgb: [0.85, 0.82, 0.78] }

  # Right wall (normal -X)
  - shape:
      plane: {}
      position: [3, 0, 0]
      rotation: [0, 0, -90]
    material:
      diffuse: { rgb: [0.85, 0.82, 0.78] }

  # Front wall (normal +Z)
  - shape:
      plane: {}
      position: [0, 0, -2]
      rotation: [0, 90, 0]
    material:
      diffuse: { rgb: [0.85, 0.82, 0.78] }

  # Coffee table
  - shape:
      box: { size: [1.0, 0.4, 1.0] }
      position: [0, 0.2, 3.0]
    material:
      diffuse: { rgb: [0.4, 0.25, 0.12] }

  # Couch base
  - shape:
      box: { size: [1.3, 0.45, 3.0] }
      position: [-2.15, 0.225, 3.0]
    material:
      diffuse: { rgb: [0.3, 0.2, 0.1] }

  # Couch back
  - shape:
      box: { size: [0.3, 0.45, 3.0] }
      position: [-2.65, 0.675, 3.0]
    material:
      diffuse: { rgb: [0.3, 0.2, 0.1] }

  # Couch cushion
  - shape:
      box: { size: [0.9, 0.1, 2.6] }
      position: [-2.05, 0.5, 3.0]
    material:
      diffuse: { rgb: [0.15, 0.25, 0.5] }

  # Bookshelf
  - shape:
      box: { size: [1.0, 1.8, 1.8] }
      position: [2.3, 0.9, 4.9]
    material:
      diffuse: { rgb: [0.3, 0.2, 0.1] }

  # Glass globe on coffee table
  - shape:
      sphere: { radius: 0.12 }
      position: [0.1, 0.55, 3.0]
    material:
      glass: { ior: 1.5, tint: { constant: 1.0 } }

  # Mirror sphere on coffee table
  - shape:
      sphere: { radius: 0.08 }
      position: [-0.2, 0.52, 2.8]
    material:
      mirror: { constant: 0.92 }

  # Red decorative ball
  - shape:
      sphere: { radius: 0.08 }
      position: [0.3, 0.5, 3.2]
    material:
      diffuse: { rgb: [0.9, 0.2, 0.2] }

# Orbiting checker globe above coffee table
moving_objects:
  - shape: { sphere: { radius: 0.12 } }
    material:
      checker_sphere:
        even: { rgb: [0.9, 0.85, 0.15] }
        odd: { rgb: [0.1, 0.1, 0.6] }
        num_squares: 8
    trajectory:
      orbit:
        center: [0, 1.2, 3.0]
        radius: 0.4
        period: 10.0
        axis: y
