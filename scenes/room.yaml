name: room

camera:
  position: [0, 1.0, -0.5]
  look_at: [0, 0.8, 3.0]
  up: [0, 1, 0]
  vfov: 70

sky:
  type: none

lights:
  - position: [2.5, 2.0, 3.0]
    emission: { blackbody: { temp: 5778, luminance: 25 } }
  - position: [0, 2.3, 3.0]
    emission: { blackbody: { temp: 3500, luminance: 12 } }
  - position: [2.3, 1.9, 4.9]
    emission: { blackbody: { temp: 3500, luminance: 5 } }

objects:
  # Floor (wood checkerboard)
  - shape: { plane: { point: [0, 0, 0], normal: [0, 1, 0] } }
    material:
      checker:
        even: { rgb: [0.55, 0.35, 0.18] }
        odd: { rgb: [0.65, 0.45, 0.25] }
        scale: 0.4

  # Ceiling
  - shape: { plane: { point: [0, 2.5, 0], normal: [0, -1, 0] } }
    material:
      diffuse: { rgb: [0.9, 0.9, 0.9] }

  # Back wall (warm red accent)
  - shape: { plane: { point: [0, 0, 6], normal: [0, 0, -1] } }
    material:
      diffuse: { rgb: [0.6, 0.15, 0.1] }

  # Left wall
  - shape: { plane: { point: [-3, 0, 0], normal: [1, 0, 0] } }
    material:
      diffuse: { rgb: [0.85, 0.82, 0.78] }

  # Right wall
  - shape: { plane: { point: [3, 0, 0], normal: [-1, 0, 0] } }
    material:
      diffuse: { rgb: [0.85, 0.82, 0.78] }

  # Front wall
  - shape: { plane: { point: [0, 0, -2], normal: [0, 0, 1] } }
    material:
      diffuse: { rgb: [0.85, 0.82, 0.78] }

  # Coffee table
  - shape: { box: { min: [-0.5, 0, 2.5], max: [0.5, 0.4, 3.5] } }
    material:
      diffuse: { rgb: [0.4, 0.25, 0.12] }

  # Couch base
  - shape: { box: { min: [-2.8, 0, 1.5], max: [-1.5, 0.45, 4.5] } }
    material:
      diffuse: { rgb: [0.3, 0.2, 0.1] }

  # Couch back
  - shape: { box: { min: [-2.8, 0.45, 1.5], max: [-2.5, 0.9, 4.5] } }
    material:
      diffuse: { rgb: [0.3, 0.2, 0.1] }

  # Couch cushion
  - shape: { box: { min: [-2.5, 0.45, 1.7], max: [-1.6, 0.55, 4.3] } }
    material:
      diffuse: { rgb: [0.15, 0.25, 0.5] }

  # Bookshelf
  - shape: { box: { min: [1.8, 0, 4.0], max: [2.8, 1.8, 5.8] } }
    material:
      diffuse: { rgb: [0.3, 0.2, 0.1] }

  # Glass globe on coffee table
  - shape: { sphere: { center: [0.1, 0.55, 3.0], radius: 0.12 } }
    material:
      glass: { ior: 1.5, tint: { constant: 1.0 } }

  # Mirror sphere on coffee table
  - shape: { sphere: { center: [-0.2, 0.52, 2.8], radius: 0.08 } }
    material:
      mirror: { constant: 0.92 }

  # Red decorative ball
  - shape: { sphere: { center: [0.3, 0.5, 3.2], radius: 0.08 } }
    material:
      diffuse: { rgb: [0.9, 0.2, 0.2] }

# Orbiting checker globe above coffee table
moving_objects:
  - shape: { sphere: { radius: 0.12 } }
    material:
      checker_sphere:
        even: { rgb: [0.9, 0.85, 0.15] }
        odd: { rgb: [0.1, 0.1, 0.6] }
        num_squares: 8
    trajectory:
      orbit:
        center: [0, 1.2, 3.0]
        radius: 0.4
        period: 10.0
        axis: y
