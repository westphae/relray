name: shapes_demo

camera:
  position: [0.5, 2.5, -3]
  look_at: [0.5, 0.3, 2]
  up: [0, 1, 0]
  vfov: 50

sky:
  type: gradient
  top: { blackbody: { temp: 12000, luminance: 0.2 } }
  bottom: { constant: 0 }

lights:
  - position: [3, 6, -1]
    emission: { blackbody: { temp: 5778, luminance: 20 } }
  - position: [-2, 4, 0]
    emission: { blackbody: { temp: 7500, luminance: 10 } }

objects:
  # Checkerboard floor
  - shape: { plane: {} }
    material:
      checker:
        even: { rgb: [0.6, 0.6, 0.6] }
        odd: { rgb: [0.2, 0.2, 0.2] }
        scale: 0.5

  # Cylinder (column)
  - shape:
      cylinder: { radius: 0.2, height: 1.5 }
      position: [-1.2, 0, 2]
    material:
      diffuse: { rgb: [0.7, 0.7, 0.75] }

  # Cone (party hat)
  - shape:
      cone: { radius: 0.4, height: 0.8 }
      position: [-0.2, 0, 2]
    material:
      diffuse: { rgb: [0.9, 0.3, 0.1] }

  # Disk (plate on the ground)
  - shape:
      disk: { radius: 0.3 }
      position: [0.5, 0.01, 2]
    material:
      diffuse: { rgb: [0.9, 0.9, 0.85] }

  # Pyramid (4-sided)
  - shape:
      pyramid: { base_radius: 0.35, height: 0.7, sides: 4 }
      position: [1.2, 0, 2]
    material:
      diffuse: { rgb: [0.8, 0.7, 0.2] }

  # Triangle (simple wedge)
  - shape: { triangle: { v0: [2, 0, 1.5], v1: [2.6, 0, 1.5], v2: [2.3, 0.6, 2] } }
    material:
      diffuse: { rgb: [0.2, 0.6, 0.2] }

  # Rotated mirror box — tilted to reflect the colored shapes
  - shape:
      box: { size: [0.7, 0.7, 0.7] }
      position: [0.5, 0.35, 3.5]
      rotation: [30, 15, 0]
    material:
      mirror: { constant: 0.9 }

  # Glass sphere for reference
  - shape:
      sphere: { radius: 0.3 }
      position: [-0.5, 0.3, 3.5]
    material:
      glass: { ior: 1.5, tint: { constant: 1.0 } }
