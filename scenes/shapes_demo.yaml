name: shapes_demo

camera:
  position: [0, 2, -4]
  look_at: [0, 0.5, 2]
  up: [0, 1, 0]
  vfov: 60

sky:
  type: gradient
  top: { blackbody: { temp: 12000, luminance: 0.2 } }
  bottom: { constant: 0 }

lights:
  - position: [3, 6, -1]
    emission: { blackbody: { temp: 5778, luminance: 20 } }
  - position: [-2, 4, 0]
    emission: { blackbody: { temp: 7500, luminance: 10 } }

objects:
  # Checkerboard floor
  - shape: { plane: { point: [0, 0, 0], normal: [0, 1, 0] } }
    material:
      checker:
        even: { rgb: [0.6, 0.6, 0.6] }
        odd: { rgb: [0.2, 0.2, 0.2] }
        scale: 0.5

  # Cylinder (column)
  - shape:
      cylinder: { radius: 0.2, height: 1.5 }
      position: [-2, 0, 2]
    material:
      diffuse: { rgb: [0.7, 0.7, 0.75] }

  # Cone (party hat)
  - shape:
      cone: { radius: 0.4, height: 0.8 }
      position: [-0.8, 0, 2]
    material:
      diffuse: { rgb: [0.9, 0.3, 0.1] }

  # Disk (plate on the ground)
  - shape: { disk: { center: [0.5, 0.01, 2], normal: [0, 1, 0], radius: 0.3 } }
    material:
      diffuse: { rgb: [0.9, 0.9, 0.85] }

  # Pyramid (4-sided)
  - shape:
      pyramid: { base_radius: 0.35, height: 0.7, sides: 4 }
      position: [1.8, 0, 2]
    material:
      diffuse: { rgb: [0.8, 0.7, 0.2] }

  # Triangle (simple wedge)
  - shape: { triangle: { v0: [3, 0, 1], v1: [3.8, 0, 1], v2: [3.4, 0.6, 1.5] } }
    material:
      diffuse: { rgb: [0.2, 0.6, 0.2] }

  # Rotated box (45 degrees around Y)
  - shape:
      box: { min: [-0.25, 0, -0.25], max: [0.25, 0.5, 0.25] }
      position: [0.5, 0, 4]
      rotation: [45, 0, 0]
    material:
      mirror: { constant: 0.9 }

  # Glass sphere for reference
  - shape: { sphere: { center: [-0.5, 0.3, 3.5], radius: 0.3 } }
    material:
      glass: { ior: 1.5, tint: { constant: 1.0 } }
